name: Docker Image Publish

on:
  push:
    branches:
      - master
    tags:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME:-manual}"
          safe_ref="$(printf '%s' "$ref_name" | tr '/:@' '---' | tr -cd '[:alnum:]._-')"
          short_sha="${GITHUB_SHA::7}"
          image_name="cpa-exporter"
          image_tag="${safe_ref}-${short_sha}"
          {
            echo "image_name=${image_name}"
            echo "image_tag=${image_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
